# Mirrors the checks CI runs in .github/workflows/tests.yaml's `lint` and
# `meta-lint` jobs, so issues surface before a commit instead of after a push.
# mypy/pyright are deliberately not included here: both need the project's
# full dependency set (Home Assistant, pytest fixtures, etc.) on PYTHONPATH to
# type-check correctly, which pre-commit's isolated hook environments don't
# give them — they stay CI (and editor/Pylance)-only.
#
# Install with: pre-commit install
repos:
  # ruff and shellcheck-py are pinned once, in requirements_dev.txt;
  # actionlint/hadolint are pinned once, in .devcontainer/tool-versions.env
  # (installed by postCreate.sh — see that script's identical comment).
  # None of the four are duplicated here as a mirror-repo `rev` —
  # language: system runs whichever binary the devcontainer already
  # installed instead of pre-commit pulling a second, separately-versioned
  # copy (or, for actionlint/hadolint, a Docker image), so there's one
  # source of truth per tool instead of two pins that can drift out of sync.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        types_or: [python, pyi, jupyter]
        require_serial: true
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
      - id: actionlint
        name: Lint GitHub Actions workflow files
        entry: actionlint
        language: system
        types: [yaml]
        files: ^\.github/workflows/
      - id: hadolint
        name: Lint Dockerfiles
        entry: hadolint
        language: system
        types: [dockerfile]
