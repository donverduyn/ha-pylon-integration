name: PR Auto-merge

# Runs only on the weekly cron (plus manual dispatch) — deliberately never on
# push or PR-activity events. Auto-merge must not react to PR activity; see
# the schedule-only project memory for why. Each weekly pass activates one
# eligible grouped patch/minor Dependabot update in a single-flight queue;
# individual and major updates stay manual. Human PRs are always merged by
# a maintainer — this workflow never touches them.
on:
  workflow_dispatch:
  schedule:
    - cron: "22 8 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  queue-dependabot-group:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    environment: automation
    permissions:
      contents: read
    steps:
      - uses: "actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1" # v7.0.1
        with:
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        uses: ./.github/actions/automation-app-token
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - name: Activate one eligible Dependabot group PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: .github/scripts/queue-dependabot-group.sh
